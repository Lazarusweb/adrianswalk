<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imprint — Adrian's Walk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:     #000;
      --text:   #fff;
      --dim:    rgba(255,255,255,0.38);
      --border: rgba(255,255,255,0.09);
      --ease:   cubic-bezier(.19,1,.22,1);
      --grad:   linear-gradient(135deg,#ff43b4 0%,#784ba0 50%,#054bff 100%);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9998;
      pointer-events: none;
      opacity: 0.038;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── Nav ── */
    #nav {
      position: fixed; inset: 0 0 auto 0; z-index: 300;
      padding: 1.75rem 3rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-size: 0.8125rem; font-weight: 800;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #fff; text-decoration: none;
    }

    .nav-back {
      font-size: 0.6875rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--dim); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem;
      transition: color 0.3s var(--ease);
    }
    .nav-back:hover { color: #fff; }

    /* ── Page layout ── */
    .page-wrap {
      max-width: 860px; margin: 0 auto;
      padding: 12rem 3rem 8rem;
    }

    .eyebrow {
      font-size: 0.6875rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--dim);
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.04em;
      text-transform: uppercase;
      margin-top: 1.25rem;
      margin-bottom: 4rem;
    }

    .page-title em {
      font-family: 'Instrument Serif', serif;
      font-style: italic; font-weight: 400;
      text-transform: none; letter-spacing: -0.02em;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.05em;
    }

    /* ── Content blocks ── */
    .legal-section {
      padding: 2.5rem 0;
      border-top: 1px solid var(--border);
    }
    .legal-section:last-of-type {
      border-bottom: 1px solid var(--border);
      margin-bottom: 4rem;
    }

    .legal-label {
      font-size: 0.62rem; font-weight: 800;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(255,255,255,0.22);
      margin-bottom: 1rem;
    }

    .legal-value {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; line-height: 1.8;
      color: rgba(255,255,255,0.58);
      font-weight: 300;
    }

    .legal-value strong {
      color: #fff; font-weight: 500;
    }

    .legal-value a {
      color: rgba(255,255,255,0.58);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.3s var(--ease);
    }
    .legal-value a:hover { color: #fff; }

    /* ── Footer ── */
    .page-footer {
      display: flex; justify-content: space-between;
      align-items: center; flex-wrap: wrap; gap: 1rem;
      padding-top: 2rem;
    }

    .page-footer span {
      font-size: 0.72rem; color: rgba(255,255,255,0.18);
      letter-spacing: 0.04em;
    }

    .page-footer-links {
      display: flex; gap: 1.5rem;
    }

    .page-footer-links a {
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.22); text-decoration: none;
      transition: color 0.3s var(--ease);
    }
    .page-footer-links a:hover { color: rgba(255,255,255,0.55); }

    @media (max-width: 780px) {
      #nav { padding: 1.25rem 1.5rem; }
      .page-wrap { padding: 9rem 1.5rem 5rem; }
      .page-footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav id="nav">
  <a href="index.html" class="nav-logo">Adrian's Walk</a>
  <a href="index.html" class="nav-back">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>
</nav>

<main class="page-wrap">

  <span class="eyebrow">Legal</span>
  <h1 class="page-title">Im<em>print.</em></h1>

  <div class="legal-section">
    <div class="legal-label">Information according to § 5 TMG</div>
    <div class="legal-value">
      <strong>Adrian Honke</strong>
    </div>
  </div>

  <div class="legal-section">
    <div class="legal-label">Contact</div>
    <div class="legal-value">
      Phone: <a href="tel:017676611642">017676611642</a><br>
      E-Mail: <a href="mailto:contact@adrianswalk.com">contact@adrianswalk.com</a>
    </div>
  </div>

  <div class="legal-section">
    <div class="legal-label">Responsible for content according to § 55 Abs. 2 RStV</div>
    <div class="legal-value">
      <strong>Adrian Honke</strong>
    </div>
  </div>

  <div class="page-footer">
    <span>© 2026 Adrian's Walk</span>
    <div class="page-footer-links">
      <a href="imprint.html">Imprint</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>

</main>

</body>
</html>
